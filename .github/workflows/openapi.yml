name: Generate OpenAPI from Bruno

on:
  push:
    paths:
      - 'apiDocuments/**'
  pull_request:
    paths:
      - 'apiDocuments/**'

jobs:
  build-openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install bru2openapi
        run: |
          go install github.com/vito-go/bru2openapi@latest

      - name: Generate OpenAPI
        run: |
          mkdir -p output
          ~/go/bin/bru2openapi -d ./apiDocuments -o ./output/openapi.yaml

      - name: Validate OpenAPI
        run: |
          npm install -g @apidevtools/swagger-cli
          swagger-cli validate ./output/openapi.yaml

      - name: Upload OpenAPI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: output/openapi.yaml
